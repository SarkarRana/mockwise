[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mockwise"
version = "0.0.0"
description = "Realistic, edge-case-aware test fixtures from your Pydantic models."
readme = "README.md"
license = "MIT"
authors = [{ name = "Rana Sarkar" }]
requires-python = ">=3.10"
keywords = ["pydantic", "test", "fixture", "mock", "ai", "llm", "testing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.30"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://github.com/sarkarrana/mockwise"
Issues = "https://github.com/sarkarrana/mockwise/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/mockwise"]

[tool.mypy]
strict = true
python_version = "3.10"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
